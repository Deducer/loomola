<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>loom-clone bubble</title>
  <meta name="color-scheme" content="light">
  <style>
    /* Hard-resetting everything because anything that paints behind the
       transparent body becomes a visible square around the camera circle
       on the captured page.

       color-scheme: normal — without an explicit value the browser
       picks a canvas color (light → white, dark → near-black) and
       paints it under our transparent body. Coolify (and presumably
       any other heavily-themed dashboard) showed this as a *white*
       square because we previously had `color-scheme: light`. `normal`
       tells Chrome we have no opinion, which results in no canvas
       paint at all — fully transparent through to the parent. */
    html, body {
      margin: 0;
      padding: 0;
      background: transparent !important;
      background-color: rgba(0, 0, 0, 0) !important;
      overflow: hidden;
      height: 100%;
      width: 100%;
      user-select: none;
      color-scheme: normal;
    }
    .bubble {
      position: absolute;
      inset: 0;
      cursor: move;
      touch-action: none;
    }
    .bubble video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.7);
      box-sizing: border-box;
    }
    /* Hover-revealed size picker, Loom-style. Inside the camera circle so
       it overlays the live image rather than floating in transparent
       space outside the bubble. */
    .toolbar {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 999px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0;
      transition: opacity 140ms ease;
      pointer-events: none;
    }
    .bubble:hover .toolbar,
    .bubble:focus-within .toolbar {
      opacity: 1;
      pointer-events: auto;
    }
    .toolbar-btn {
      cursor: pointer;
      border: none;
      background: transparent;
      padding: 4px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 100ms;
    }
    .toolbar-btn:hover { background: rgba(255, 255, 255, 0.12); }
    .toolbar-dot {
      background: rgba(255, 255, 255, 0.7);
      border-radius: 50%;
      transition: background 100ms;
    }
    .toolbar-btn.active .toolbar-dot { background: white; }
    .toolbar-dot.size-small  { width: 7px;  height: 7px;  }
    .toolbar-dot.size-medium { width: 10px; height: 10px; }
    .toolbar-dot.size-large  { width: 13px; height: 13px; }
    .err {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a1a1aa;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 11px;
      text-align: center;
      padding: 8px;
      background: #0b0b0c;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="bubble" id="bubble">
    <video id="cam" autoplay playsinline muted></video>
    <div class="toolbar" id="toolbar" aria-label="Bubble size">
      <button class="toolbar-btn" data-size="small"  aria-label="Small bubble">
        <span class="toolbar-dot size-small"></span>
      </button>
      <button class="toolbar-btn" data-size="medium" aria-label="Medium bubble">
        <span class="toolbar-dot size-medium"></span>
      </button>
      <button class="toolbar-btn" data-size="large"  aria-label="Large bubble">
        <span class="toolbar-dot size-large"></span>
      </button>
    </div>
  </div>
  <script src="bubble.js"></script>
</body>
</html>
